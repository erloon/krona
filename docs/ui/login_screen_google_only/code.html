<!DOCTYPE html>

<html class="dark" lang="pl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-dim": "#35ceb1",
              "tertiary-container": "#d8f2d3",
              "on-error-container": "#ff9993",
              "surface-container": "#131b1b",
              "inverse-on-surface": "#525656",
              "on-tertiary": "#4e654d",
              "on-surface-variant": "#a1aead",
              "outline": "#6b7878",
              "on-background": "#dbe8e8",
              "on-secondary-fixed-variant": "#4c5f5c",
              "on-secondary": "#112321",
              "secondary": "#8ea29e",
              "background": "#0b0f0f",
              "on-error": "#490106",
              "tertiary-fixed": "#e1fbdb",
              "tertiary-dim": "#d5efd0",
              "primary-fixed-dim": "#5bebcc",
              "secondary-fixed-dim": "#c4d9d5",
              "error-container": "#7f2927",

              "on-primary-fixed": "#00483c",
              "on-tertiary-fixed": "#394f38",
              "surface": "#0b0f0f",
              "secondary-fixed": "#d2e7e3",
              "surface-container-low": "#0f1414",
              "secondary-dim": "#8ea29e",
              "surface-container-high": "#182121",
              "surface-container-lowest": "#000000",
              "primary": "#49ddbf",
              "primary-fixed": "#6bfada",
              "on-surface": "#dbe8e8",
              "inverse-surface": "#f7faf9",
              "surface-tint": "#49ddbf",
              "inverse-primary": "#006c5a",
              "surface-variant": "#1c2828",
              "error-dim": "#bb5551",
              "on-primary": "#00493d",
              "on-secondary-fixed": "#304340",
              "secondary-container": "#2c3f3c",
              "on-primary-container": "#56e7c8",
              "tertiary": "#ebffe6",
              "surface-bright": "#202f2f",
              "primary-container": "#005143",
              "on-primary-fixed-variant": "#006857",
              "surface-container-highest": "#1c2828",
              "surface-dim": "#0b0f0f",
              "outline-variant": "#3e4a4a",
              "on-tertiary-container": "#465c45"

            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "0.75rem", "xl": "1rem", "2xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .bg-glass {
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }
      .nordic-gradient {
        background: linear-gradient(135deg, #49ddbf 0%, #005143 100%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 min-h-screen flex flex-col items-center justify-center p-6 sm:p-12 overflow-hidden">
<!-- Subtle Background Texture -->
<div class="fixed inset-0 z-0 opacity-20 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-[30%] h-[30%] rounded-full bg-primary-container/20 blur-[100px]"></div>
</div>
<!-- Main Content Container -->
<main class="relative z-10 w-full max-w-md flex flex-col items-center">
<!-- Brand Identity Section -->
<header class="mb-16 text-center">
<div class="inline-flex items-center justify-center mb-6">
<div class="w-14 h-14 nordic-gradient rounded-2xl flex items-center justify-center shadow-[0_10px_30px_rgba(0,81,67,0.3)]">
<span class="material-symbols-outlined text-on-primary text-4xl" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
</div>
<h1 class="font-headline font-extrabold text-5xl tracking-tighter text-primary mb-3">Krona</h1>
<p class="text-on-surface-variant font-medium tracking-tight text-lg">Szybki i bezpieczny dostęp do Twoich finansów</p>
</header>
<!-- Auth Section: Simplified focused Google Sign-In -->
<section class="w-full">
<div class="p-[1.5px] bg-gradient-to-b from-primary/30 to-transparent rounded-2xl">
<button class="w-full flex items-center justify-center gap-4 bg-surface-bright hover:bg-surface-container-high transition-all duration-300 py-6 px-8 rounded-[calc(1rem+2px)] shadow-xl active:scale-[0.98] group">
<svg class="w-7 h-7" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.67-.35-1.39-.35-2.09s.13-1.42.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-headline font-bold text-xl text-on-surface group-hover:text-primary transition-colors">Zaloguj się przez Google</span>
</button>
</div>
</section>
<!-- Trust & Footer Section -->
<footer class="mt-20 w-full">
<div class="flex flex-col items-center gap-10">
<!-- Trust Badges -->
<div class="flex justify-center items-center gap-10 grayscale opacity-40 hover:grayscale-0 hover:opacity-100 transition-all duration-500">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-lg">verified_user</span>
<span class="text-[10px] font-label uppercase tracking-widest">Bank-Level Security</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-lg">encrypted</span>
<span class="text-[10px] font-label uppercase tracking-widest">AES-256</span>
</div>
</div>
<!-- Legal/Language -->
<nav class="flex flex-wrap justify-center gap-x-6 gap-y-2">
<a class="text-xs text-on-surface-variant hover:text-primary transition-colors" href="#">Polityka prywatności</a>
<a class="text-xs text-on-surface-variant hover:text-primary transition-colors" href="#">Regulamin</a>
<div class="flex items-center gap-1 text-xs text-on-surface-variant ml-2">
<span class="material-symbols-outlined text-sm">language</span>
<button class="font-semibold text-primary">PL</button>
<span class="opacity-30">/</span>
<button class="hover:text-on-surface">EN</button>
</div>
</nav>
</div>
</footer>
</main>
<!-- Decorative Corner Element (Asymmetric Detail) -->
<div class="fixed top-0 right-0 w-64 h-64 opacity-[0.03] pointer-events-none translate-x-1/4 -translate-y-1/4">
<svg class="fill-on-surface" viewbox="0 0 100 100">
<path d="M0,0 L100,0 L100,100 Z"></path>
</svg>
</div>
</body></html>
