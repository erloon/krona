<!DOCTYPE html>

<html class="dark" lang="pl"><head>

              "on-primary-container": "#56e7c8",

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .bg-nordic-gradient {
        background: radial-gradient(circle at center, #0f1414 0%, #0b0f0f 100%);
      }
      .brand-glow {
        filter: drop-shadow(0 0 15px rgba(73, 221, 191, 0.15));
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body selection:bg-primary/30 antialiased overflow-hidden">
<!-- Splash Screen Container -->
<main class="relative h-screen w-full flex flex-col items-center justify-center bg-nordic-gradient p-8">
<!-- Abstract Atmospheric Element (Texture) -->
<div class="absolute inset-0 opacity-20 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-[30%] h-[30%] bg-primary-container/10 rounded-full blur-[100px]"></div>
</div>
<!-- Brand Identity Core -->
<div class="relative z-10 flex flex-col items-center gap-6">
<!-- Logo Iconography -->
<div class="w-20 h-20 rounded-2xl bg-surface-container-highest flex items-center justify-center mb-4 brand-glow">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">
                    currency_exchange
                </span>
</div>
<!-- Brand Name -->
<div class="text-center">
<h1 class="font-headline font-extrabold text-5xl tracking-tighter text-primary">
                    Krona
                </h1>
<!-- Tagline -->
<p class="mt-4 font-body text-sm font-medium tracking-[0.2em] text-on-surface-variant uppercase opacity-80">
                    Finansowy Asystent B2B
                </p>
</div>
</div>
<!-- Interaction / Status Indicator (Minimalist) -->
<div class="absolute bottom-16 left-0 w-full flex flex-col items-center gap-4 px-12">
<!-- Subtle Loading State -->
<div class="w-12 h-[2px] bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full w-1/3 bg-primary/40 rounded-full"></div>
</div>
<span class="text-[10px] font-label font-semibold tracking-widest text-outline uppercase">
                Initializing Ledger
            </span>
</div>
<!-- Decorative Scandinavian Accent -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/20 to-transparent"></div>
</main>
<!-- Hidden shell components suppressed due to Splash Screen context as per "Relevance Check" rule -->
</body></html>
