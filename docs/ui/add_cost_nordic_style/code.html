<!DOCTYPE html>

<html class="dark" lang="pl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container-low": "#0f1414",
                    "on-tertiary": "#4e654d",
                    "on-error-container": "#ff9993",
                    "tertiary": "#ebffe6",
                    "secondary-dim": "#8ea29e",
                    "primary-container": "#005143",
                    "on-primary-fixed-variant": "#006857",
                    "on-primary-fixed": "#00483c",
                    "tertiary-container": "#d8f2d3",
                    "surface-container-highest": "#1c2828",
                    "on-surface": "#dbe8e8",
                    "secondary-container": "#2c3f3c",
                    "surface-container-lowest": "#000000",
                    "surface-dim": "#0b0f0f",
                    "primary-dim": "#35ceb1",
                    "tertiary-fixed": "#e1fbdb",
                    "on-primary-container": "#56e7c8",
                    "error-container": "#7f2927",
                    "on-tertiary-fixed-variant": "#556c53",
                    "on-tertiary-fixed": "#394f38",
                    "outline-variant": "#3e4a4a",
                    "inverse-surface": "#f7faf9",
                    "inverse-primary": "#006c5a",
                    "on-secondary-fixed-variant": "#4c5f5c",
                    "primary-fixed-dim": "#5bebcc",
                    "on-secondary-container": "#afc4bf",
                    "error": "#ee7d77",
                    "secondary": "#8ea29e",
                    "outline": "#6b7878",
                    "on-secondary": "#112321",
                    "surface-container-high": "#182121",
                    "error-dim": "#bb5551",
                    "surface-variant": "#1c2828",
                    "on-primary": "#00493d",
                    "on-surface-variant": "#a1aead",
                    "primary": "#49ddbf",
                    "on-background": "#dbe8e8",
                    "on-secondary-fixed": "#304340",
                    "on-tertiary-container": "#465c45",
                    "secondary-fixed-dim": "#c4d9d5",
                    "surface-bright": "#202f2f",
                    "secondary-fixed": "#d2e7e3",
                    "background": "#0b0f0f",
                    "surface-tint": "#49ddbf",
                    "inverse-on-surface": "#525656",
                    "tertiary-fixed-dim": "#d2edce",
                    "tertiary-dim": "#d5efd0",
                    "primary-fixed": "#6bfada",
                    "on-error": "#490106",
                    "surface-container": "#131b1b",
                    "surface": "#0b0f0f"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0b0f0f;
            color: #dbe8e8;
            font-family: 'Inter', sans-serif;
        }
        .hero-text {
            font-family: 'Manrope', sans-serif;
        }
        input:focus {
            outline: none;
            box-shadow: none;
        }
        .ghost-border:focus-within {
            border-color: rgba(73, 221, 191, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen">
<header class="fixed top-0 w-full z-50 bg-[#0b0f0f] flex items-center px-6 h-16 w-full">
<div class="flex items-center gap-4">
<button class="text-[#49ddbf] hover:bg-[#1c2828] transition-colors p-2 rounded-full flex items-center justify-center active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Manrope'] text-lg font-semibold tracking-tight text-[#dbe8e8]">Nowy koszt</h1>
</div>
</header>
<main class="mt-16 mb-32 px-6 pt-8 space-y-10 max-w-2xl mx-auto w-full">
<section class="space-y-2">
<label class="font-label text-xs font-medium uppercase tracking-widest text-on-surface-variant">Kwota netto</label>
<div class="flex items-baseline gap-3">
<input class="hero-text bg-transparent border-none p-0 text-5xl sm:text-6xl font-extrabold text-on-surface w-full placeholder:text-surface-container-highest focus:ring-0" placeholder="0,00" type="text"/>
<span class="font-label text-xl font-semibold text-primary">PLN</span>
</div>
</section>
<section class="space-y-4">
<label class="font-label text-xs font-medium uppercase tracking-widest text-on-surface-variant">Stawka VAT</label>
<div class="flex flex-wrap gap-2">
<button class="px-5 py-2 rounded-full text-sm font-semibold bg-primary text-on-primary transition-all">23%</button>
<button class="px-5 py-2 rounded-full text-sm font-semibold bg-surface-container-highest text-on-surface-variant hover:text-primary transition-all">8%</button>
<button class="px-5 py-2 rounded-full text-sm font-semibold bg-surface-container-highest text-on-surface-variant hover:text-primary transition-all">5%</button>
<button class="px-5 py-2 rounded-full text-sm font-semibold bg-surface-container-highest text-on-surface-variant hover:text-primary transition-all">0%</button>
<button class="px-5 py-2 rounded-full text-sm font-semibold bg-surface-container-highest text-on-surface-variant hover:text-primary transition-all">NP</button>
</div>
</section>
<section class="space-y-6">
<div class="space-y-2">
<label class="font-label text-xs font-medium uppercase tracking-widest text-on-surface-variant">Nazwa kosztu</label>
<div class="ghost-border border border-transparent bg-surface-container-highest rounded-xl px-4 py-1 transition-all">
<input class="w-full bg-transparent border-none py-3 text-on-surface placeholder:text-outline focus:ring-0 font-medium" placeholder="Np. Abonament Adobe" type="text"/>
</div>
</div>
<div class="space-y-4">
<label class="font-label text-xs font-medium uppercase tracking-widest text-on-surface-variant">Kategoria i odliczenie</label>
<div class="space-y-3">
<button class="w-full flex items-center justify-between p-4 bg-surface-container-low rounded-xl border border-primary/20 transition-all hover:bg-surface-container-high group">
<div class="text-left">
<p class="font-bold text-on-surface group-hover:text-primary transition-colors">Standard</p>
<p class="text-xs text-on-surface-variant">100% PIT, 100% VAT</p>
</div>
<span class="material-symbols-outlined text-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<button class="w-full flex items-center justify-between p-4 bg-surface-container-highest rounded-xl transition-all hover:bg-surface-container-high group">
<div class="text-left">
<p class="font-bold text-on-surface group-hover:text-primary transition-colors">Samochód - 50/50</p>
<p class="text-xs text-on-surface-variant">75% PIT, 50% VAT</p>
</div>
<span class="material-symbols-outlined text-outline" data-icon="directions_car">directions_car</span>
</button>
<button class="w-full flex items-center justify-between p-4 bg-surface-container-highest rounded-xl transition-all hover:bg-surface-container-high group">
<div class="text-left">
<p class="font-bold text-on-surface group-hover:text-primary transition-colors">Samochód - 100% Firma</p>
<p class="text-xs text-on-surface-variant">100% PIT, 100% VAT</p>
</div>
<span class="material-symbols-outlined text-outline" data-icon="car_rental">car_rental</span>
</button>
</div>
</div>
</section>
<section class="space-y-4">
<label class="font-label text-xs font-medium uppercase tracking-widest text-on-surface-variant">Załącznik</label>
<div class="relative group cursor-pointer h-48 rounded-2xl bg-surface-container-low border-2 border-dashed border-outline-variant hover:border-primary/40 flex flex-col items-center justify-center transition-all">
<span class="material-symbols-outlined text-4xl text-outline mb-2 group-hover:text-primary transition-colors" data-icon="add_a_photo">add_a_photo</span>
<p class="text-sm font-medium text-on-surface-variant">Dodaj zdjęcie paragonu lub faktury</p>
<input class="absolute inset-0 opacity-0 cursor-pointer" type="file"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="relative h-24 rounded-xl overflow-hidden bg-surface-container-highest">
<img alt="Receipt Preview" class="w-full h-full object-cover opacity-60" data-alt="close-up of a paper grocery receipt with black text on white thermal paper, soft cinematic lighting in dark studio" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCGu4wh8NfCpr9Ttti13om6ss7VNAiiOz-d103bPvZda2q4TtxZ-SiC2-WVAEMECNAhwXA08r_9ILHDIz5Veq8BchzMeGPDiHuY0UfMe6G7gC6_kmPNxznijen6tyoxJiDLQtDj0gnAabFor8MKH9w0v4tAtN7UGBKv3ZRK9Od1ycny1ISzwsPA6Jy7g_qBHzjHatq5qSomZ0mrh0oaR4cssufBETVOW0dDFpV0rnO4Q2vYFrXOtXUDX1Q05qL5sWAuLZuBVZgmKl0q"/>
<button class="absolute top-1 right-1 bg-[#0b0f0f]/80 p-1 rounded-lg text-error">
<span class="material-symbols-outlined text-sm" data-icon="close">close</span>
</button>
</div>
</div>
</section>
</main>
<footer class="fixed bottom-0 left-0 w-full z-50 bg-[#0b0f0f]/80 backdrop-blur-xl px-6 pb-10 pt-4 flex flex-col gap-3">
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold rounded-xl active:scale-[0.98] transition-transform shadow-[0_20px_40px_rgba(0,73,61,0.08)]">
            Zapisz koszt
        </button>
<button class="w-full py-3 text-on-surface-variant font-medium hover:text-on-surface transition-colors">
            Anuluj
        </button>
</footer>
</body></html>
